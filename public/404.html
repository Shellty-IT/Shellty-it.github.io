<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#070b14" />
    <meta name="robots" content="noindex, follow" />
    <title>Shellty</title>
    <!--
      GitHub Pages SPA redirect fix.
      When GitHub returns 404 for a deep URL like /experience,
      this script encodes the path as a query string and redirects
      to the root. The decode script in index.html restores the URL.
      pathSegmentsToKeep = 0 → user page (shellty-it.github.io, no repo prefix)
    -->
    <script type="text/javascript">
        var pathSegmentsToKeep = 0;
        var l = window.location;
        l.replace(
            l.protocol + '//' + l.host +
            l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
            l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
    </script>
</head>
<body></body>
</html>
